      ca:
        __name: BOOMBOOM_REDIS_SENTINEL_TLS_SETTINGS_CA
        __format: json
      cert:
        __name: BOOMBOOM_REDIS_SENTINEL_TLS_SETTINGS_CERT
        __format: json
      key:
        __name: BOOMBOOM_REDIS_SENTINEL_TLS_SETTINGS_KEY
