      __name: BOOMBOOM_OBJECT_STORAGE_STREAMING_PLAYLISTS_STORE_LIVE_STREAMS
      __format: json
  web_videos:
    bucket_name: BOOMBOOM_OBJECT_STORAGE_WEB_VIDEOS_BUCKET_NAME
    prefix: BOOMBOOM_OBJECT_STORAGE_WEB_VIDEOS_PREFIX
    base_url: BOOMBOOM_OBJECT_STORAGE_WEB_VIDEOS_BASE_URL
  user_exports:
    bucket_name: BOOMBOOM_OBJECT_STORAGE_USER_EXPORTS_BUCKET_NAME
    prefix: BOOMBOOM_OBJECT_STORAGE_USER_EXPORTS_PREFIX
    base_url: BOOMBOOM_OBJECT_STORAGE_USER_EXPORTS_BASE_URL
