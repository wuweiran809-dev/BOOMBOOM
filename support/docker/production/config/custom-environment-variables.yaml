object_storage:
  enabled:
    __name: BOOMBOOM_OBJECT_STORAGE_ENABLED
    __format: json
  endpoint: BOOMBOOM_OBJECT_STORAGE_ENDPOINT
  region: BOOMBOOM_OBJECT_STORAGE_REGION
