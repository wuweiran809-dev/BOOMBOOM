  web_videos: BOOMBOOM_STORAGE_WEB_VIDEOS
  streaming_playlists: BOOMBOOM_STORAGE_STREAMING_PLAYLISTS
  original_video_files: BOOMBOOM_STORAGE_ORIGINAL_VIDEO_FILES
