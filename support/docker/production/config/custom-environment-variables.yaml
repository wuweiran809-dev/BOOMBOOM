    __name: BOOMBOOM_OBJECT_STORAGE_FORCE_PATH_STYLE
    __format: json
  upload_acl:
    public: BOOMBOOM_OBJECT_STORAGE_UPLOAD_ACL_PUBLIC
    private: BOOMBOOM_OBJECT_STORAGE_UPLOAD_ACL_PRIVATE
  proxy:
    proxify_private_files:
      __name: BOOMBOOM_OBJECT_STORAGE_PROXY_PROXIFY_PRIVATE_FILES
