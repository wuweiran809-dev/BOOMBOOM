      __name: BOOMBOOM_RATES_LIMIT_ASK_SEND_EMAIL_MAX
      __format: json
  receive_client_log:
    window: BOOMBOOM_RATES_LIMIT_RECEIVE_CLIENT_LOG_WINDOW
    max:
      __name: BOOMBOOM_RATES_LIMIT_RECEIVE_CLIENT_LOG_MAX
      __format: json
  plugins:
    window: BOOMBOOM_RATES_LIMIT_PLUGINS_WINDOW
    max:
      __name: BOOMBOOM_RATES_LIMIT_PLUGINS_MAX
      __format: json
  well_known:
    window: BOOMBOOM_RATES_LIMIT_WELL_KNOWN_WINDOW
    max:
      __name: BOOMBOOM_RATES_LIMIT_WELL_KNOWN_MAX
      __format: json
  feeds:
    window: BOOMBOOM_RATES_LIMIT_FEEDS_WINDOW
    max:
      __name: BOOMBOOM_RATES_LIMIT_FEEDS_MAX
      __format: json
  activity_pub:
    window: BOOMBOOM_RATES_LIMIT_ACTIVITY_PUB_WINDOW
    max:
      __name: BOOMBOOM_RATES_LIMIT_ACTIVITY_PUB_MAX
      __format: json
  client:
    window: BOOMBOOM_RATES_LIMIT_CLIENT_WINDOW
    max:
      __name: BOOMBOOM_RATES_LIMIT_CLIENT_MAX
      __format: json
  download_generate_video:
    window: BOOMBOOM_RATES_LIMIT_DOWNLOAD_GENERATE_VIDEO_WINDOW
    max:
      __name: BOOMBOOM_RATES_LIMIT_DOWNLOAD_GENERATE_VIDEO_MAX
      __format: json

