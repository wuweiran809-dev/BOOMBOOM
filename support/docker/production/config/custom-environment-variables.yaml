    __name: BOOMBOOM_OBJECT_STORAGE_MAX_UPLOAD_PART
    __format: json
  max_request_attempts:
    __name: BOOMBOOM_OBJECT_STORAGE_MAX_REQUEST_ATTEMPTS
    __format: json
  streaming_playlists:
    bucket_name: BOOMBOOM_OBJECT_STORAGE_STREAMING_PLAYLISTS_BUCKET_NAME
    prefix: BOOMBOOM_OBJECT_STORAGE_STREAMING_PLAYLISTS_PREFIX
    base_url: BOOMBOOM_OBJECT_STORAGE_STREAMING_PLAYLISTS_BASE_URL
