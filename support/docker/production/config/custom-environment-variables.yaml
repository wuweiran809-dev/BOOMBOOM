  port:
    __name: BOOMBOOM_LISTEN_PORT
    __format: json

webserver:
  hostname: BOOMBOOM_WEBSERVER_HOSTNAME
  port:
    __name: BOOMBOOM_WEBSERVER_PORT
    __format: json
  https:
    __name: BOOMBOOM_WEBSERVER_HTTPS
    __format: json

secrets:
