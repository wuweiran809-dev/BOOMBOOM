    window: BOOMBOOM_RATES_LIMIT_API_WINDOW
    max:
      __name: BOOMBOOM_RATES_LIMIT_API_MAX
      __format: json
  login:
    window: BOOMBOOM_RATES_LIMIT_LOGIN_WINDOW
    max:
      __name: BOOMBOOM_RATES_LIMIT_LOGIN_MAX
      __format: json
  signup:
    window: BOOMBOOM_RATES_LIMIT_SIGNUP_WINDOW
    max:
      __name: BOOMBOOM_RATES_LIMIT_SIGNUP_MAX
      __format: json
