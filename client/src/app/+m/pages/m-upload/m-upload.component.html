<div class="m-up">
  <!-- hidden native pickers -->
  <input #videoInput type="file" accept="video/*" hidden (change)="onVideoPicked($event)" />
  <input #coverInput type="file" accept="image/*" hidden (change)="onCoverPicked($event)" />

  <!-- header -->
  <div class="m-up-head">
    <button class="m-up-cancel" (click)="cancel()" i18n="@@boomboom.m.upload.cancel">Cancel</button>
    <span class="m-up-title" i18n="@@boomboom.m.upload.title">Publish</span>
    <span class="m-up-draft"></span>
  </div>

  <div class="m-up-scroll">
    <!-- cover + basic -->
    <div class="m-up-row1">
      <button class="m-up-cover" [style.background-image]="coverPreview() ? 'url(' + coverPreview() + ')' : ''" (click)="coverInput.click()">
        @if (!coverPreview()) {
          <my-global-icon iconName="add"></my-global-icon>
          <span class="main" i18n="@@boomboom.m.upload.cover">Cover</span>
          <span class="hint" i18n="@@boomboom.m.upload.coverHint">3:4 portrait</span>
        }
      </button>
      <div class="m-up-fields">
        <input class="m-up-name" type="text" [(ngModel)]="title" maxlength="20" i18n-placeholder="@@boomboom.m.upload.namePlaceholder" placeholder="Title (max 20 chars)" />
        <textarea class="m-up-desc" [(ngModel)]="desc" i18n-placeholder="@@boomboom.m.upload.descPlaceholder" placeholder="Write a synopsis to hook viewers…"></textarea>
      </div>
    </div>

    <!-- category -->
    <div class="m-up-label" i18n="@@boomboom.m.upload.genreLabel">Genre</div>
    <div class="m-up-genres">
      @for (g of genres; track g; let i = $index) {
        <button class="m-up-genre" [class.active]="selectedGenre() === g" [style.--rot]="(i % 2 === 0 ? -2 : 2) + 'deg'" (click)="selectGenre(g)">{{ g }}</button>
      }
    </div>

    <!-- series / drama name (groups episodes) -->
    <div class="m-up-label" i18n="@@boomboom.m.upload.seriesLabel">Series name (optional)</div>
    <input class="m-up-series" type="text" [(ngModel)]="seriesName" maxlength="80" placeholder="同名归为一部剧,单集可留空" i18n-placeholder="@@boomboom.m.upload.seriesPlaceholder" />

    <!-- video file -->
    <div class="m-up-eplabel">
      <span i18n="@@boomboom.m.upload.videoLabel">Video</span>
      <span class="cnt" i18n="@@boomboom.m.upload.episodesHint">Tap + to pick a video</span>
    </div>
    <div class="m-up-epgrid">
      @if (videoFile()) {
        <button class="m-up-epfile" (click)="videoInput.click()">
          <my-global-icon iconName="videos"></my-global-icon>
          <span class="fn">{{ videoName }}</span>
        </button>
      } @else {
        <button class="m-up-epadd" (click)="videoInput.click()">
          <my-global-icon iconName="add"></my-global-icon>
        </button>
      }
    </div>

    <!-- pricing -->
    <div class="m-up-pricing">
      <div class="m-up-price-row">
        <div class="left">
          <my-global-icon iconName="burst"></my-global-icon>
          <span i18n="@@boomboom.m.upload.paidUnlock">Paid unlock</span>
        </div>
        <button class="m-toggle" [class.on]="paidUnlock()" (click)="togglePaid()"><span></span></button>
      </div>
      @if (paidUnlock()) {
        <div class="m-up-price-sub">
          <span i18n="@@boomboom.m.upload.pricePerEp">Price</span>
          <span class="v gold"><my-global-icon iconName="burst"></my-global-icon>
            <input class="m-up-price-input" type="number" min="0" max="99999" [(ngModel)]="coinPrice" /> <ng-container i18n="@@boomboom.m.upload.coins">coins</ng-container>
          </span>
        </div>
      }
    </div>

    @if (uploading()) {
      <div class="m-up-progress">
        <div class="bar"><div class="fill" [style.width.%]="progress()"></div></div>
        <div class="pct">{{ progress() }}%</div>
      </div>
    }
  </div>

  <!-- footer -->
  <div class="m-up-footer">
    <button class="m-up-publish" [disabled]="uploading()" (click)="publish()">
      @if (uploading()) {
        <ng-container i18n="@@boomboom.m.upload.publishing">Publishing…</ng-container>
      } @else {
        <ng-container i18n="@@boomboom.m.upload.publish">Publish</ng-container>
      }
    </button>
  </div>
</div>
