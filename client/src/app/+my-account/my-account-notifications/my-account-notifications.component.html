<!-- Mobile Notifications View -->
@if (isMobile) {
  <div class="bb-notif">
    <!-- Header: hamburger + 消息 + mark all read -->
    <div class="bb-notif-header">
      <button class="bb-notif-icon-btn" (click)="toggleMenu()">
        <my-global-icon iconName="menu"></my-global-icon>
      </button>
      <span class="bb-notif-title" i18n>消息</span>
      <button
        class="bb-notif-icon-btn"
        [disabled]="!hasUnreadNotifications()"
        (click)="markAllAsRead()"
        i18n-title title="全部标为已读"
      >
        <my-global-icon iconName="tick"></my-global-icon>
      </button>
    </div>

    <!-- Category circles -->
    <div class="bb-notif-cats">
      <div class="bb-cat">
        <div class="bb-cat-circle cat-update">
          <my-global-icon iconName="videos"></my-global-icon>
        </div>
        <span i18n>更新</span>
      </div>
      <div class="bb-cat">
        <div class="bb-cat-circle cat-like">
          <my-global-icon iconName="like"></my-global-icon>
        </div>
        <span i18n>赞</span>
      </div>
      <div class="bb-cat">
        <div class="bb-cat-circle cat-comment">
          <my-global-icon iconName="message-circle"></my-global-icon>
        </div>
        <span i18n>评论</span>
      </div>
      <div class="bb-cat">
        <div class="bb-cat-circle cat-fans">
          <my-global-icon iconName="user"></my-global-icon>
        </div>
        <span i18n>粉丝</span>
      </div>
    </div>

    <!-- Real notification list -->
    <div class="bb-notif-list">
      <div class="bb-notif-recent" i18n>最近</div>
      <my-user-notifications #userNotification inPopup="false"></my-user-notifications>
    </div>
  </div>
}

<!-- Desktop Notifications View -->
@if (!isMobile) {
  <div class="header">
    <div class="boomboom-select-container me-auto">
      <select [(ngModel)]="notificationSortType" (ngModelChange)="onChangeSortColumn()" class="form-control" i18n-ariaLabel aria-label="Sort by">
        <option value="createdAt" i18n>Newest first</option>
        <option value="read" [disabled]="!hasUnreadNotifications()" i18n>Unread first</option>
      </select>
    </div>

    <a class="boomboom-button-link secondary-button" routerLink="/my-account/settings" fragment="notifications">
      <my-global-icon iconName="cog" aria-hidden="true"></my-global-icon>
      <span i18n>Notification preferences</span>
    </a>

    <button class="boomboom-button secondary-button" [disabled]="!hasUnreadNotifications()" (click)="markAllAsRead()">
      @if (hasUnreadNotifications()) {
        <my-global-icon iconName="tick" aria-hidden="true"></my-global-icon>
        <span i18n>Mark all as read</span>
      }

      @if (!hasUnreadNotifications()) {
        <my-global-icon iconName="circle-tick" aria-hidden="true"></my-global-icon>
        <span i18n>All read</span>
      }
    </button>
  </div>

  <div>
    <my-user-notifications #userNotification inPopup="false"></my-user-notifications>
  </div>
}
